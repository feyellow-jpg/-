<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서부산·원도심 고장 탐사대</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&family=Nanum+Myeongjo:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root { --primary: #0f172a; --accent: #0d9488; --bg: #f8fafc; }
        body { font-family: 'Pretendard', sans-serif; background-color: #e2e8f0; margin: 0; padding: 0; overflow: hidden; }
        
        .slide-container {
            width: 1280px; height: 720px; background: white; margin: 20px auto;
            position: relative; overflow: hidden; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            display: none; flex-direction: column; padding: 60px; border-radius: 12px;
        }
        .active { display: flex; }
        
        /* 컨설팅 스타일 데코레이션 */
        .slide-header { border-bottom: 2px solid var(--primary); padding-bottom: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        .slide-title { font-family: 'Nanum Myeongjo', serif; font-size: 42px; color: var(--primary); margin: 0; }
        .slide-subtitle { color: var(--accent); font-weight: bold; }

        /* 지도 레이아웃 */
        .map-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; flex-grow: 1; align-items: center; }
        .map-card { 
            background: var(--bg); border: 2px solid #e2e8f0; border-radius: 16px; padding: 30px; 
            text-align: center; cursor: pointer; transition: all 0.3s; height: 100%; display: flex; flex-direction: column; justify-content: center;
        }
        .map-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .map-card h3 { font-size: 28px; margin-bottom: 10px; }
        .map-card p { font-size: 14px; color: #64748b; }

        /* 학습/퀴즈 UI */
        .content-split { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; flex-grow: 1; }
        .image-box { border-radius: 12px; overflow: hidden; height: 350px; background: #eee; border: 1px solid #ddd; position: relative; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
        .info-text { font-size: 18px; line-height: 1.6; color: #334155; white-space: pre-line; }
        
        .btn-action { background: var(--primary); color: white; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        .btn-action:hover { opacity: 0.9; transform: scale(1.02); }

        /* 업로드 UI */
        .upload-zone { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 20px; text-align: center; background: #f1f5f9; cursor: pointer; }
        .upload-zone:hover { border-color: var(--accent); background: #f0fdfa; }

        /* 애니메이션 */
        @keyframes successPop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .success-overlay { position: absolute; inset: 0; background: rgba(13, 148, 136, 0.9); display: none; justify-content: center; align-items: center; z-index: 50; animation: successPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); color: white; border-radius: 12px; }
    </style>
</head>
<body>

<div class="slide-container active" id="slide-login">
    <div style="margin: auto; text-align: center; max-width: 600px;">
        <h1 style="font-size: 64px; margin-bottom: 10px; font-family: 'Nanum Myeongjo';">부산 고장 탐사대</h1>
        <p style="font-size: 20px; color: #64748b; margin-bottom: 50px;">3학년 사회 - 우리 고장의 모습 실감 학습</p>
        <div class="space-y-4">
            <input type="number" id="st-num" placeholder="학급 번호" class="w-full p-4 border rounded-lg text-lg">
            <input type="text" id="st-name" placeholder="이름" class="w-full p-4 border rounded-lg text-lg">
            <button onclick="app.start()" class="w-full btn-action" style="font-size: 20px;">탐사 시작하기</button>
        </div>
        <p style="margin-top: 30px; font-size: 12px; color: #94a3b8;">※ 구글 드라이브와 Firebase 실시간 연동 시스템</p>
    </div>
</div>

<div class="slide-container" id="slide-map">
    <div class="slide-header">
        <h2 class="slide-title">고장 탐사 지도</h2>
        <div class="slide-subtitle" id="user-info"></div>
    </div>
    <div class="map-grid">
        <div class="map-card" style="grid-column: 2" onclick="app.goDetail('dong')"><h3>동구</h3><p>초량 이바구길 / 168계단</p><span id="chk-dong">🤍</span></div>
        <div class="map-card" onclick="app.goDetail('saha')"><h3>사하구</h3><p>다대포 / 감천문화마을</p><span id="chk-saha">🤍</span></div>
        <div class="map-card" onclick="app.goDetail('seo')"><h3>서구</h3><p>송도 해수욕장 / 구름다리</p><span id="chk-seo">🤍</span></div>
        <div class="map-card" onclick="app.goDetail('jung')"><h3>중구</h3><p>자갈치시장 / 용두산공원</p><span id="chk-jung">🤍</span></div>
        <div class="map-card" style="grid-column: 2" onclick="app.goDetail('yeongdo')"><h3>영도구</h3><p>태종대 / 흰여울문화마을</p><span id="chk-yeongdo">🤍</span></div>
    </div>
</div>

<div class="slide-container" id="slide-detail">
    <div class="slide-header">
        <h2 class="slide-title" id="det-title">고장 이름</h2>
        <button onclick="app.goMap()" class="text-slate-500 font-bold hover:underline">🏠 지도로 돌아가기</button>
    </div>
    <div class="content-split">
        <div class="space-y-6">
            <div class="image-box">
                <img id="det-img" src="" alt="실사">
                <div id="upload-success" class="success-overlay flex-col">
                    <span class="text-4xl">📸</span>
                    <span class="font-bold mt-2">나의 사진 업로드 성공!</span>
                </div>
            </div>
            <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-in').click()">
                <p class="font-bold text-slate-700">📸 사진 올리기 또는 스크린샷 붙여넣기</p>
                <p class="text-xs text-slate-500 mt-1">이곳을 클릭해 파일을 선택하거나 Ctrl+V를 누르세요</p>
                <input type="file" id="file-in" class="hidden" accept="image/*" onchange="app.handleFile(this.files[0])">
            </div>
        </div>
        <div class="flex flex-col justify-between">
            <p id="det-desc" class="info-text"></p>
            <div class="bg-slate-50 p-6 rounded-xl border">
                <p class="font-bold mb-4 text-slate-800">✏️ 확인 퀴즈</p>
                <p id="det-quiz" class="text-lg mb-4"></p>
                <div id="det-opts" class="grid grid-cols-2 gap-2"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 1. Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyCS8kWxKMV9qk06wxeEaYnNa9FK652CDsU",
        authDomain: "sahagu-69868.firebaseapp.com",
        projectId: "sahagu-69868",
        storageBucket: "sahagu-69868.firebasestorage.app",
        messagingSenderId: "635938643907",
        appId: "1:635938643907:web:c6fc1a012c7acea1a76776",
        measurementId: "G-35GC10BWF1"
    };

    // 2. 구글 앱스 스크립트(GAS) 웹 앱 URL 🌟(선생님이 주신 주소 연동 완료!)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzAVpdjYIrIYFOTHyqDAhAdoFgufoaRm3HmMqvvZumbrDTSnfgqaJSvIb9GEVNptwgi/exec"; 

    const app_fb = initializeApp(firebaseConfig);
    const db = getFirestore(app_fb);

    const zoneData = {
        saha: { name: "사하구", img: "DA.jpg", desc: "다대포 해수욕장은 넓은 갯벌이 있어 조개잡이 체험이 가능하며, 세계적인 낙조 분수로 유명합니다. 감천문화마을은 계단식 마을로 '부산의 마추픽추'라 불립니다.", quiz: "다대포에서 할 수 있는 체험은?", opts: ["스키 타기", "조개 잡기", "눈썰매 타기", "사막 탐험"], ans: 1 },
        seo: { name: "서구", img: "SONG.jpg", desc: "송도 해수욕장은 우리나라 1호 해수욕장입니다. 바다 위를 걷는 듯한 구름산책로와 짜릿한 해상케이블카를 즐길 수 있습니다.", quiz: "우리나라 1호 해수욕장의 이름은?", opts: ["해운대", "광안리", "송도", "다대포"], ans: 2 },
        yeongdo: { name: "영도구", img: "TAE.jpg", desc: "태종대는 깎아지른 절벽과 푸른 바다가 어우러진 명승지입니다. 흰여울문화마을은 절벽 끝 바다길을 따라 걷는 아름다운 마을입니다.", quiz: "영도의 남쪽 끝, 절벽이 아름다운 곳은?", opts: ["태종대", "용두산", "어린이대공원", "시민공원"], ans: 0 },
        jung: { name: "중구", img: "JA.jpg", desc: "자갈치시장은 부산에서 가장 큰 수산물 시장입니다. '오이소 보이소 사이소'라는 구호로 유명하며 싱싱한 생선이 가득합니다.", quiz: "부산의 대표적인 수산물 시장은?", opts: ["국제시장", "자갈치시장", "평화시장", "꽃시장"], ans: 1 },
        dong: { name: "동구", img: "GAM.jpg", desc: "초량 이바구길은 산복도로의 역사를 담은 길입니다. 168계단과 모노레일은 가파른 동네를 연결해주는 신기한 교통수단입니다.", quiz: "동구의 가파른 계단 수는 몇 개인가요?", opts: ["100개", "150개", "168개", "200개"], ans: 2 }
    };

    window.app = {
        stKey: "", num: "", name: "", currentZone: "",
        learned: new Set(),

        start: async function() {
            this.num = document.getElementById('st-num').value;
            this.name = document.getElementById('st-name').value;
            if(!this.num || !this.name) return alert("정보를 입력하세요.");
            this.stKey = `${this.num.padStart(2,'0')}_${this.name}`;
            document.getElementById('user-info').innerText = `${this.num}번 ${this.name} 탐험가`;
            this.showSlide('slide-map');
            this.updateLMS("탐험 시작");
        },

        showSlide: (id) => {
            document.querySelectorAll('.slide-container').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        },

        goMap: function() { this.showSlide('slide-map'); this.updateLMS("지도 대기"); },

        goDetail: function(key) {
            this.currentZone = key;
            const data = zoneData[key];
            document.getElementById('det-title').innerText = data.name;
            document.getElementById('det-img').src = data.img;
            document.getElementById('det-desc').innerText = data.desc;
            document.getElementById('det-quiz').innerText = data.quiz;
            document.getElementById('upload-success').style.display = 'none';
            
            const optsDiv = document.getElementById('det-opts');
            optsDiv.innerHTML = '';
            data.opts.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.className = "p-3 border rounded-lg hover:bg-slate-100 text-sm";
                btn.onclick = () => this.checkAns(idx);
                optsDiv.appendChild(btn);
            });
            this.showSlide('slide-detail');
            this.updateLMS(`${data.name} 학습 중`);
        },

        checkAns: function(idx) {
            if(idx === zoneData[this.currentZone].ans) {
                alert("딩동댕! 정답입니다.");
                this.learned.add(this.currentZone);
                document.getElementById(`chk-${this.currentZone}`).innerText = "✅";
                this.updateLMS(`${zoneData[this.currentZone].name} 마스터!`);
            } else {
                alert("다시 한 번 읽어볼까요?");
            }
        },

        updateLMS: async function(status) {
            await setDoc(doc(db, "seobusan_lms_v2", this.stKey), {
                num: parseInt(this.num), name: this.name, status: status, count: this.learned.size, time: new Date().toLocaleTimeString()
            }, { merge: true });
        },

        // 📸 사진 및 스크린샷 처리 로직
        handleFile: async function(file) {
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64Data = e.target.result.split(',')[1];
                const payload = {
                    fileName: `${this.stKey}_${this.currentZone}.png`,
                    mimeType: file.type,
                    base64: base64Data
                };

                // 구글 드라이브로 파일 전송
                try {
                    const response = await fetch(GAS_URL, {
                        method: "POST",
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    if(result.result === "success") {
                        document.getElementById('upload-success').style.display = 'flex';
                        this.updateLMS(`${zoneData[this.currentZone].name} 사진 업로드함`);
                    }
                } catch (err) {
                    alert("업로드 중 오류가 발생했습니다. 구글 권한 설정을 확인하세요.");
                }
            };
            reader.readAsDataURL(file);
        }
    };

    // 붙여넣기(Ctrl+V) 감지하여 스크린샷 즉시 업로드
    window.addEventListener('paste', (e) => {
        const item = e.clipboardData.items[0];
        if (item && item.type.indexOf('image') !== -1) {
            const blob = item.getAsFile();
            app.handleFile(blob);
        }
    });
</script>
</body>
</html>
